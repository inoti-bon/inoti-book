<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="ko">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시력데이터 분석하기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --accent: #1a6fef;
  --text: #0f1c2e;
  --muted: #4b6080;
  --border: rgba(0,0,0,0.09);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  padding: 12px;
}

body::before {
  content: "";
  position: fixed;
  top: -30%; right: -20%;
  width: 65vw; height: 65vw;
  background: radial-gradient(circle, rgba(42,127,255,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.container {
  position: relative;
  z-index: 1;
  /* [FIX] 로그인 후 부드러운 페이드인 */
  transition: opacity 0.4s ease;
  max-width: 900px;
  margin: auto;
  background: #fff;
  border-radius: 20px;
  padding: 20px 28px;
  color: var(--text);
  box-shadow:0 4px 16px rgba(0,0,0,0.10);
}

/* 헤더 */
.header {
  position: relative;
  text-align: center;
  margin-bottom: 14px;
}

.header h1 {
  margin: 0 0 10px;
  font-size: 22px;
  font-weight: 900;
  color: #1e3a8a;
}

.close-btn {
  position: absolute;
  right: 0; top: 0;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: #f1f5f9;
  font-size: 18px;
  cursor: pointer;
  color: #64748b;
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  transition: background .2s;
}
.close-btn:hover { background: #e2e8f0; }

/* 고객 행 */
.customer-row {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 14px;
  background: #eef3fb;
  border: 2px solid #c7d9f0;
  border-radius: 12px;
  padding: 10px 16px;
}

.customer-row label {
  display: block;
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  font-weight: 800;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* 눈 행 */
.eye-row {
  display: grid;
  grid-template-columns: 52px repeat(7, 1fr);
  gap: 8px;
  align-items: end;
  background: #f8fafc;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 10px;
}

.eye-badge {
  width: 40px; height: 40px;
  border-radius: 50%;
  color: white;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.eye-row-r { background: #fff5f5; border-color: #fecaca !important; }
.eye-row-l { background: #eff6ff; border-color: #bfdbfe !important; }

.r { background: linear-gradient(135deg, #ef3f6b, #dc2626); }
.l { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }

.field label {
  display: block;
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  font-weight: 800;
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}

input, select {
  width: 100%;
  height: 38px;
  border: 1px solid var(--border);
  border-radius: 8px;
  text-align: center;
  font-size: 14px;
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  color: #111;
  background: white;
  transition: border-color .2s;
  -webkit-appearance: none;
}

input:focus, select:focus {
  outline: none;
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}

input::placeholder { color: #bdc5d1; }
select option { background: white; color: #111; }

/* ADD */
.add-box {
  border: 2px dashed #93c5fd;
  border-radius: 12px;
  padding: 12px 0;
  margin: 10px 0;
  text-align: center;
  background: #f0f7ff;
}

.add-box label {
  display: block;
  font-weight: 900;
  color: #1e3a8a;
  margin-bottom: 8px;
  font-size: 13px;
  letter-spacing: 1px;
}

.add-box input {
  max-width: 150px;
  border: 2px solid #3b82f6;
  color: #334155;
  font-weight: 700;
}

/* 카드 */
.card {
  border: 1.5px solid #c7d9f0;
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 10px;
  background: #f7faff;
}

.card-title {
  font-weight: 900;
  margin-bottom: 10px;
  font-size: 14px;
  color: #1e3a8a;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title::before {
  content: "";
  display: inline-block;
  width: 4px; height: 16px;
  background: #3b82f6;
  border-radius: 2px;
  flex-shrink: 0;
}

/* 특이사항 라디오 */
.radio-group {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.radio-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all .2s;
  background: white;
  color: #475569;
}

.radio-item:has(input:checked) {
  background: #eff6ff;
  border-color: #3b82f6;
  color: #1d4ed8;
  font-weight: 700;
}

.radio-item input {
  width: auto;
  height: auto;
  border: none;
  box-shadow: none;
  accent-color: #3b82f6;
}

/* 불편사항 */
.symptom-item select { font-size: 14px; font-weight: 700; }

.symptom-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.symptom-item label {
  display: block;
  font-size: 15px;
  font-weight: 900;
  margin-bottom: 5px;
  color: #1e3a8a;
}

/* 버튼 */
.button-group {
  display: grid;
  grid-template-columns: 1fr 1.6fr;
  gap: 10px;
  margin-top: 14px;
}

button {
  height: 48px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  transition: all .2s;
}

.btn-back {
  background: #f1f5f9;
  color: #1e3a8a;
}
.btn-back:hover { background: #e2e8f0; }

.btn-analysis {
  background: linear-gradient(135deg, #1d4ed8, #2a7fff);
  color: white;
  box-shadow: 0 4px 16px rgba(26,111,239,0.20);
}
.btn-analysis:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(42,127,255,0.4);
}

@media (max-width: 768px) {
  body { padding: 12px; }
  .container { padding: 24px 16px; }
  .eye-row { grid-template-columns: 42px repeat(2, 1fr); }
  .symptom-grid { grid-template-columns: 1fr 1fr; }
  .button-group { grid-template-columns: 1fr; }
  .customer-row { grid-template-columns: 1fr; }
}

/* ── PC + 태블릿 최적화 ── */
@media screen and (max-width:1280px){
  .cust-zs-cols{margin-left:8%!important;margin-right:8%!important;}
}
@media screen and (max-width:1024px){
  /* rx-banner 고정폭 제거 */
  .rx-banner{min-width:0!important;flex-wrap:wrap!important;}
  /* 가격카드 마진 축소 + 줄바꿈 허용 */
  .cust-zs-cols{margin-left:4%!important;margin-right:4%!important;flex-wrap:wrap!important;}
  /* 에실로 가격테이블 수평스크롤 */
  .es-img-tbl{overflow-x:auto!important;-webkit-overflow-scrolling:touch;display:block;width:100%;box-sizing:border-box;}
  /* 수평 오버플로 차단 */
  .cust-zs-wrap,.cust-zs-scroll{overflow-x:hidden!important;}
  /* 비교/참조 테이블 */
  .pc-cmp-tbl,.pc-ref-tbl{font-size:11px;}
  .pc-cmp-tbl th,.pc-cmp-tbl td,
  .pc-ref-tbl  th,.pc-ref-tbl  td{padding:4px 6px!important;}
  /* 브랜드탭 가로스크롤 */
  .brand-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap!important;}
  .brand-tab{min-width:fit-content!important;white-space:nowrap!important;}
  /* bottom-bar 줄바꿈 */
  .bb-col2{flex-wrap:wrap;gap:4px!important;}
  /* 사이드바 자동 숨김 */
  .sidebar{transform:translateX(-100%);transition:transform .3s ease;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0!important;}
  /* 팝업박스 너비 조정 */
  .popup-box,.pc-box{max-width:90vw!important;box-sizing:border-box;}
}
@media screen and (max-width:768px){
  .cust-zs-cols{margin-left:2%!important;margin-right:2%!important;}
  .cust-zs-col{flex:1 1 90%!important;max-width:100%!important;min-width:0!important;}
  .badge-name{font-size:16px!important;}
  .zs-td{font-size:11px!important;padding:2px 3px!important;}
  .es-img-tbl th,.es-img-tbl td{font-size:11px!important;padding:4px 5px!important;}
  .brand-tabs{gap:4px!important;}
  .bottom-bar{padding:6px 12px!important;}
}
</style>
<script>
/* ── INOTI 인증 (인라인) ── */
var INOTI_AUTH = {
  ACCESS_PW:"inoti8300", ADMIN_PW:"@@inoti8300!!",
  SESSION_KEY:"inoti_access", ADMIN_KEY:"inoti_admin", SESSION_MIN:1440,
  isLoggedIn:function(){var t=localStorage.getItem(this.SESSION_KEY);return t&&(Date.now()-parseInt(t))/60000<this.SESSION_MIN;},
  isAdmin:function(){var t=localStorage.getItem(this.ADMIN_KEY);return t&&(Date.now()-parseInt(t))/60000<60;},
  login:function(){localStorage.setItem(this.SESSION_KEY,Date.now());},
  adminLogin:function(){localStorage.setItem(this.ADMIN_KEY,Date.now());},
  logout:function(){localStorage.removeItem(this.SESSION_KEY);localStorage.removeItem(this.ADMIN_KEY);}
};
function showAccessGate(onSuccess){
  if(INOTI_AUTH.isLoggedIn()){onSuccess();return;}
  if(!document.getElementById("_auth_style")){
    var s=document.createElement("style");s.id="_auth_style";
    s.textContent=".auth-ov{position:fixed;inset:0;background:linear-gradient(135deg,#060d1a,#0d1b2e);display:flex;align-items:center;justify-content:center;z-index:99999;font-family:'Noto Sans KR',sans-serif}.auth-bx{background:rgba(13,27,46,.97);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px 36px;width:320px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.6);animation:authIn .4s ease}@keyframes authIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}.auth-logo{font-size:26px;font-weight:900;color:#e8f0fb;margin-bottom:4px;letter-spacing:2px}.auth-sub{font-size:12px;color:#5a7a9a;margin-bottom:24px}.auth-lbl{font-size:11px;font-weight:700;color:#5a7a9a;letter-spacing:1px;margin-bottom:8px;text-align:left}.auth-inp{width:100%;padding:13px 16px;background:rgba(6,13,26,.7);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e8f0fb;font-size:15px;text-align:center;outline:none;margin-bottom:14px;letter-spacing:3px;transition:border-color .2s}.auth-inp:focus{border-color:rgba(42,127,255,.5)}.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1d5bd4,#2a7fff);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(42,127,255,.3)}.auth-err{font-size:12px;color:#fca5a5;margin-top:10px;min-height:18px}.auth-shake{animation:shake .4s ease}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}";
    document.head.appendChild(s);
  }
  document.body.style.overflow="hidden";
  var ov=document.createElement("div");ov.className="auth-ov";ov.id="accessGate";
  ov.innerHTML='<div class="auth-bx"><div class="auth-logo">INOTI</div><div class="auth-sub">Eyecare Solution</div><div class="auth-lbl">접속 비밀번호</div><input class="auth-inp" type="password" id="_apw" placeholder="••••••••" autocomplete="off"><button class="auth-btn" id="_abtn">입장하기</button><div class="auth-err" id="_aerr"></div></div>';
  document.body.prepend(ov);
  var inp=document.getElementById("_apw");
  inp.focus();
  function tryLogin(){
    if(inp.value===INOTI_AUTH.ACCESS_PW){
      INOTI_AUTH.login();
      ov.style.transition="opacity .3s";ov.style.opacity="0";
      setTimeout(function(){ov.remove();document.body.style.overflow="";onSuccess();},300);
    } else {
      var bx=ov.querySelector(".auth-bx");
      bx.classList.remove("auth-shake");void bx.offsetWidth;bx.classList.add("auth-shake");
      document.getElementById("_aerr").textContent="비밀번호가 올바르지 않습니다";
      inp.value="";inp.focus();
    }
  }
  document.getElementById("_abtn").addEventListener("click",tryLogin);
  inp.addEventListener("keydown",function(e){if(e.key==="Enter")tryLogin();});
}
function showAdminGate(onSuccess){
  if(INOTI_AUTH.isAdmin()){onSuccess();return;}
  var ov=document.createElement("div");ov.className="auth-ov";ov.id="adminGate";
  ov.style.background="rgba(0,0,0,.85)";ov.style.backdropFilter="blur(8px)";
  ov.innerHTML='<div class="auth-bx"><div class="auth-logo" style="font-size:20px">🔐 관리자 인증</div><div class="auth-sub">관리자 비밀번호를 입력하세요</div><div class="auth-lbl">관리자 비밀번호</div><input class="auth-inp" type="password" id="_admpw" placeholder="••••••••" autocomplete="off"><button class="auth-btn" id="_admbtn">편집 시작</button><div class="auth-err" id="_admerr"></div><div style="margin-top:12px"><button id="_admcancel" style="background:none;border:none;color:#5a7a9a;font-size:12px;cursor:pointer">취소</button></div></div>';
  document.body.prepend(ov);
  var inp=document.getElementById("_admpw");inp.focus();
  function tryAdmin(){
    if(inp.value===INOTI_AUTH.ADMIN_PW){INOTI_AUTH.adminLogin();ov.remove();onSuccess();}
    else{var bx=ov.querySelector(".auth-bx");bx.classList.remove("auth-shake");void bx.offsetWidth;bx.classList.add("auth-shake");document.getElementById("_admerr").textContent="관리자 비밀번호가 올바르지 않습니다";inp.value="";inp.focus();}
  }
  document.getElementById("_admbtn").addEventListener("click",tryAdmin);
  inp.addEventListener("keydown",function(e){if(e.key==="Enter")tryAdmin();});
  document.getElementById("_admcancel").addEventListener("click",function(){ov.remove();});
}
</script>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>도수 정보 입력</h1>
    <div class="customer-row">
      <div>
        <label>고객명</label>
        <input id="customerName" placeholder="고객명">
      </div>
      <div>
        <label>나이</label>
        <input id="age" type="number" placeholder="예: 42">
      </div>
    </div>
    <button class="close-btn" onclick="goHome()">×</button>
  </div>

  <!-- R -->
  <div class="eye-row eye-row-r">
    <div class="eye-badge r">R</div>
    <div class="field"><label>SPH</label><input id="r_sph" placeholder="-1.50"></div>
    <div class="field"><label>CYL</label><input id="r_cyl" placeholder="-0.50"></div>
    <div class="field"><label>AXIS</label><input id="r_axis" placeholder="180"></div>
    <div class="field"><label>PRISM</label><input id="r_prism" placeholder="1.00"></div>
    <div class="field">
      <label>BASE</label>
      <select id="r_base">
        <option value="">-</option>
        <option>BI</option><option>BO</option><option>BU</option><option>BD</option>
      </select>
    </div>
    <div class="field">
      <label>나안</label>
      <select id="r_raw">
        <option value="">선택</option>
        <option>0.1</option><option>0.2</option><option>0.3</option><option>0.4</option>
        <option>0.5</option><option>0.6</option><option>0.7</option><option>0.8</option>
        <option>0.9</option><option>1.0</option>
      </select>
    </div>
    <div class="field">
      <label>교정</label>
      <select id="r_corrected">
        <option value="">선택</option>
        <option>0.7</option><option>0.8</option><option>0.9</option>
        <option>1.0</option><option>1.2</option><option>1.5</option>
      </select>
    </div>
  </div>

  <!-- L -->
  <div class="eye-row eye-row-l">
    <div class="eye-badge l">L</div>
    <div class="field"><label>SPH</label><input id="l_sph" placeholder="-1.50"></div>
    <div class="field"><label>CYL</label><input id="l_cyl" placeholder="-0.50"></div>
    <div class="field"><label>AXIS</label><input id="l_axis" placeholder="180"></div>
    <div class="field"><label>PRISM</label><input id="l_prism" placeholder="1.00"></div>
    <div class="field">
      <label>BASE</label>
      <select id="l_base">
        <option value="">-</option>
        <option>BI</option><option>BO</option><option>BU</option><option>BD</option>
      </select>
    </div>
    <div class="field">
      <label>나안</label>
      <select id="l_raw">
        <option value="">선택</option>
        <option>0.1</option><option>0.2</option><option>0.3</option><option>0.4</option>
        <option>0.5</option><option>0.6</option><option>0.7</option><option>0.8</option>
        <option>0.9</option><option>1.0</option>
      </select>
    </div>
    <div class="field">
      <label>교정</label>
      <select id="l_corrected">
        <option value="">선택</option>
        <option>0.7</option><option>0.8</option><option>0.9</option>
        <option>1.0</option><option>1.2</option><option>1.5</option>
      </select>
    </div>
  </div>

  <!-- ADD -->
  <div class="add-box">
    <label>ADD</label>
    <input id="add" placeholder="+0.00">
  </div>

  <!-- 특이사항 -->
  <div class="card">
    <div class="card-title">특이사항</div>
    <div class="radio-group">
      <label class="radio-item"><input type="radio" name="special" value="해당없음" checked> 해당없음</label>
      <label class="radio-item"><input type="radio" name="special" value="근시 억제"> 근시 억제</label>
      <label class="radio-item"><input type="radio" name="special" value="라식/라섹"> 라식/라섹</label>
      <label class="radio-item"><input type="radio" name="special" value="백내장"> 백내장</label>
    </div>
  </div>

  <!-- 불편사항 -->
  <div class="card">
    <div class="card-title">검사 후 주요 불편사항</div>
    <div class="symptom-grid">
      <div class="symptom-item">
        <label>근거리 불편</label>
        <select id="nearDiscomfort">
          <option value="">선택</option>
          <option>없음</option><option>약함</option><option>보통</option><option>심함</option>
        </select>
      </div>
      <div class="symptom-item">
        <label>야간 빛번짐</label>
        <select id="nightGlare">
          <option value="">선택</option>
          <option>없음</option><option>약함</option><option>보통</option><option>심함</option>
        </select>
      </div>
      <div class="symptom-item">
        <label>눈 피로</label>
        <select id="eyeFatigue">
          <option value="">선택</option>
          <option>없음</option><option>약함</option><option>보통</option><option>심함</option>
        </select>
      </div>
      <div class="symptom-item">
        <label>건조감</label>
        <select id="dryness">
          <option value="">선택</option>
          <option>없음</option><option>약함</option><option>보통</option><option>심함</option>
        </select>
      </div>
    </div>
  </div>

  <div class="button-group">
    <button class="btn-back" onclick="goHome()">홈으로</button>
    <button class="btn-analysis" onclick="goAnalysis()">결과분석하기</button>
  </div>

</div>

<script>
/* [FIX] 인증 게이트 — body 최하단 실행, DOM 준비 완료 상태 */
(function () {
  const c = document.querySelector(".container");
  if (c) c.style.opacity = "0";
  showAccessGate(function () {
    if (c) c.style.opacity = "1";
  });
})();

/* ── 1. 도수 입력 자동 포맷 (SPH / CYL)
   - 숫자만 입력 → 자동으로 앞에 - 붙임
   - 3자리: 첫 번째 수 뒤에 .  예) 150 → -1.50
   - 4자리: 두 번째 수 뒤에 .  예) 1250 → -12.50  (고도수 대비)
   - 단, +로 시작하면 원시로 인식해 + 유지
   - . 직접 입력 허용
── */
function formatDiopter(el) {
  el.addEventListener("input", function() {
    let raw = this.value;

    // + 또는 - 부호 추출
    let sign = "-"; // 기본 음수
    if (raw.startsWith("+")) { sign = "+"; raw = raw.slice(1); }
    else if (raw.startsWith("-")) { sign = "-"; raw = raw.slice(1); }

    // 숫자와 . 만 허용
    raw = raw.replace(/[^0-9.]/g, "");

    // . 이미 있으면 포맷 건드리지 않음 (직접 입력 중)
    if (raw.includes(".")) {
      this.value = sign + raw;
      return;
    }

    // 순수 숫자만
    const digits = raw.replace(/\./g, "");
    if (digits.length === 0) { this.value = ""; return; }
    if (digits.length === 1) { this.value = sign + digits; return; }
    if (digits.length === 2) { this.value = sign + digits; return; }
    if (digits.length === 3) {
      // 3자리: 첫 번째 뒤에 . → X.XX
      this.value = sign + digits[0] + "." + digits.slice(1);
      return;
    }
    if (digits.length >= 4) {
      // 4자리: 두 번째 뒤에 . → XX.XX
      this.value = sign + digits.slice(0, 2) + "." + digits.slice(2, 4);
      return;
    }
  });

  // 포커스 아웃 시 빈 값이면 초기화
  el.addEventListener("blur", function() {
    if (this.value === "-" || this.value === "+") this.value = "";
  });
}

/* ── 2. ADD 입력 자동 포맷
   - 자동으로 + 붙임
   - 3자리: 첫 번째 수 뒤에 .  예) 100 → +1.00
── */
function formatAdd(el) {
  el.addEventListener("input", function() {
    let raw = this.value;

    // 부호 제거 후 숫자/. 만 추출
    raw = raw.replace(/[^0-9.]/g, "");

    if (raw.includes(".")) {
      this.value = raw ? "+" + raw : "";
      return;
    }

    const digits = raw.replace(/\./g, "");
    if (digits.length === 0) { this.value = ""; return; }
    if (digits.length === 1) { this.value = "+" + digits; return; }
    if (digits.length === 2) { this.value = "+" + digits; return; }
    if (digits.length >= 3) {
      this.value = "+" + digits[0] + "." + digits.slice(1, 3);
      return;
    }
  });

  el.addEventListener("blur", function() {
    if (this.value === "+") this.value = "";
  });
}

// 도수 포맷 적용 (SPH, CYL — AXIS, PRISM 제외)
["r_sph","r_cyl","l_sph","l_cyl"].forEach(id => {
  formatDiopter(document.getElementById(id));
});

// ADD 포맷 적용
formatAdd(document.getElementById("add"));

/* ── 유틸 ── */
function getSpecialValue() {
  const checked = document.querySelector('input[name="special"]:checked');
  return checked ? checked.value : "해당없음";
}

function showError(msg) {
  let el = document.getElementById("validationError");
  if (!el) {
    el = document.createElement("div");
    el.id = "validationError";
    el.className = "error-msg";
    document.querySelector(".button-group").before(el);
  }
  el.textContent = msg;
  el.style.display = "block";
}

function clearError() {
  const el = document.getElementById("validationError");
  if (el) el.style.display = "none";
  document.querySelectorAll(".input-error").forEach(e => e.classList.remove("input-error"));
}

function goHome()     { location.href = "../index.html"; }
function goAnalysis() {
  clearError();

  // 필수 항목 검증
  const name = document.getElementById("customerName").value.trim();
  const age  = document.getElementById("age").value.trim();
  const nd   = document.getElementById("nearDiscomfort").value;
  const ng   = document.getElementById("nightGlare").value;
  const ef   = document.getElementById("eyeFatigue").value;
  const dry  = document.getElementById("dryness").value;

  let errors = [];
  if (!name) {
    document.getElementById("customerName").classList.add("input-error");
    errors.push("고객명");
  }
  if (!age) {
    document.getElementById("age").classList.add("input-error");
    errors.push("나이");
  }
  if (!nd)  { document.getElementById("nearDiscomfort").classList.add("input-error"); errors.push("근거리 불편"); }
  if (!ng)  { document.getElementById("nightGlare").classList.add("input-error");    errors.push("야간 빛번짐"); }
  if (!ef)  { document.getElementById("eyeFatigue").classList.add("input-error");    errors.push("눈 피로"); }
  if (!dry) { document.getElementById("dryness").classList.add("input-error");       errors.push("건조감"); }

  if (errors.length > 0) {
    showError("필수 입력 항목을 확인해주세요: " + errors.join(", "));
    return;
  }

  collectVisionData();
  location.href = "analyze.html";
}
