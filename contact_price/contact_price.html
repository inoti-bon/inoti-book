<html lang="ko" translate="no">

<title>콘택트렌즈 가격표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f7ff;
  --navy: #0f1f45;
  --blue: #1e56c8;
  --surface: #ffffff;
  --border: #dde5f4;
  --text: #1a2540;
  --muted: #8baecf;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── 상단 바 ── */
.top-bar {
  background: var(--navy);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.top-bar .brand { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size:17px; color:white; }
.tbtn {
  padding:6px 13px; border-radius:7px; font-size:12px; font-weight:700;
  cursor:pointer; border:none; font-family:'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background:rgba(255,255,255,.1); color:rgba(255,255,255,.8); transition:all .2s;
}
.tbtn:hover { background:rgba(255,255,255,.2); }

/* ── 페이지 타이틀 ── */
.page-header {
  background: var(--navy);
  padding: 14px 20px 22px;
  text-align: center;
  color: white;
}
.page-header h1 { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size:22px; margin-bottom:3px; }
.page-header p  { font-size:11px; opacity:.85; }

/* ── 브랜드 탭 ── */
.brand-tabs {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
  display: flex;
  justify-content: center;
  gap: 2px;
  overflow-x: auto;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(15,31,69,.08);
  scrollbar-width: none;
}
.brand-tabs::-webkit-scrollbar { display:none; }

.brand-tab {
  flex-shrink: 0;
  padding: 13px 18px 11px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--muted);
  border-bottom: 3px solid transparent;
  transition: all .2s;
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.brand-tab:hover { color: var(--text); }
.brand-tab.active { color: var(--text); border-bottom-color: var(--bc); }

.bdot { width:8px; height:8px; border-radius:50%; background:var(--bc); flex-shrink:0; }

/* ── 메인 ── */
.main { max-width:880px; margin:0 auto; padding:18px 14px 80px; transition:opacity 0.4s ease; }
.brand-tabs, .page-header, .bottom-bar { transition:opacity 0.4s ease; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── 브랜드 헤더 ── */
.brand-header {
  border-radius:14px;
  padding:16px 20px;
  margin-bottom:14px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  animation:fadeUp .3s ease;
}
.bh-name { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size:20px; margin-bottom:2px; }
.bh-sub  { font-size:11px; opacity:.75; }
.bh-logo { font-size:32px; }

/* ── 착용주기 필터 ── */
.period-filter {
  display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap;
  animation:fadeUp .35s ease;
}
.pf-btn {
  padding:5px 14px; border-radius:999px;
  border:1.5px solid var(--border);
  background:white; font-size:12px; font-weight:700;
  cursor:pointer; color:var(--muted); transition:all .2s;
  font-family:'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
}
.pf-btn:hover   { border-color:var(--blue); color:var(--blue); }
.pf-btn.active  { background:var(--blue); border-color:var(--blue); color:white; }

/* ── 테이블 ── */
.price-table-wrap {
  background:white; border-radius:14px; overflow:hidden;
  box-shadow:0 2px 16px rgba(15,31,69,.07);
  border:1px solid var(--border);
  animation:fadeUp .4s ease;
}

.price-table { width:100%; border-collapse:collapse; }

.price-table thead tr { background:var(--navy); color:white; }
.price-table th {
  padding:10px 12px; font-size:11px; font-weight:700;
  letter-spacing:.4px; text-align:center; white-space:nowrap;
}
.price-table th.left { text-align:left; }

.price-table tbody tr {
  border-bottom:1px solid #f0f4fc; transition:background .15s;
}
.price-table tbody tr:last-child { border-bottom:none; }
.price-table tbody tr:hover { background:#f8faff; }

.price-table td {
  padding:10px 12px; font-size:13px;
  text-align:center; color:var(--text);
  vertical-align:middle;
}
.price-table td.left { text-align:left; }

/* 그룹 첫 행 — 구분선 강조 */
.price-table tbody tr.group-start td {
  border-top:2px solid #e8edf8;
}

/* 착용주기 배지 */
.pb {
  display:inline-block; font-size:10px; font-weight:700;
  padding:2px 8px; border-radius:4px; white-space:nowrap;
}
.pb-1day   { background:#e8f5e9; color:#2e7d32; }
.pb-color  { background:#fce4ec; color:#c62828; }
.pb-long   { background:#e3f2fd; color:#1565c0; }
.pb-astig  { background:#fff3e0; color:#e65100; }
.pb-multi  { background:#f3e5f5; color:#6a1b9a; }

/* 제품명 */
.pname { font-weight:700; line-height:1.4; }

/* [FIX] .qty-price-row 제거 — renderTable이 인라인 스타일로 대체 */
.qty-chip {
  display:inline-block; background:#f0f4fc; color:var(--navy);
  font-size:11px; font-weight:700; padding:2px 8px; border-radius:5px;
  white-space:nowrap; flex-shrink:0;
}

/* [FIX] .price-col, .price-msrp 제거 — 인라인 스타일로 대체됨 */
.price-inoti { font-size:14px; font-weight:900; color:var(--blue); }
.disc {
  display:inline-block; background:#fff0f0; color:#e53e3e;
  font-size:10px; font-weight:700; padding:1px 6px;
  border-radius:4px; margin-left:5px; vertical-align:middle;
}

/* 빈 상태 */
.empty-state { text-align:center; padding:40px 20px; color:var(--muted); }
.empty-state .ei { font-size:32px; margin-bottom:8px; }

/* ── 하단 버튼 ── */
.bottom-bar {
  position:sticky; bottom:0;
  background:rgba(244,247,255,.96); backdrop-filter:blur(10px);
  padding:10px 18px; border-top:1px solid var(--border);
  display:flex; gap:8px; justify-content:center;
}
.bbtn {
  padding:11px 24px; border:none; border-radius:10px;
  font-size:13px; font-weight:700; cursor:pointer;
  font-family:'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; transition:all .2s;
}
.bbtn-gray { background:#e2e8f0; color:#334155; }
.bbtn-gray:hover { background:#cbd5e1; }
.bbtn-navy { background:linear-gradient(135deg,#0f1f45,#1e56c8); color:white; }
.bbtn-navy:hover { transform:translateY(-1px); }

@media(max-width:600px){
  .price-table th, .price-table td { padding:8px 7px; font-size:11px; }
  .price-inoti { font-size:13px; }
  .brand-tab { padding:11px 10px 9px; font-size:12px; }
}




/* ── PC + 태블릿 최적화 ── */
@media screen and (max-width:1280px){
  .cust-zs-cols{margin-left:8%!important;margin-right:8%!important;}
}
@media screen and (max-width:1024px){
  /* rx-banner 고정폭 제거 */
  .rx-banner{min-width:0!important;flex-wrap:wrap!important;}
  /* 가격카드 마진 축소 + 줄바꿈 허용 */
  .cust-zs-cols{margin-left:4%!important;margin-right:4%!important;flex-wrap:wrap!important;}
  /* 에실로 가격테이블 수평스크롤 */
  .es-img-tbl{overflow-x:auto!important;-webkit-overflow-scrolling:touch;display:block;width:100%;box-sizing:border-box;}
  /* 수평 오버플로 차단 */
  .cust-zs-wrap,.cust-zs-scroll{overflow-x:hidden!important;}
  /* 비교/참조 테이블 */
  .pc-cmp-tbl,.pc-ref-tbl{font-size:11px;}
  .pc-cmp-tbl th,.pc-cmp-tbl td,
  .pc-ref-tbl  th,.pc-ref-tbl  td{padding:4px 6px!important;}
  /* 브랜드탭 가로스크롤 */
  .brand-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap!important;}
  .brand-tab{min-width:fit-content!important;white-space:nowrap!important;}
  /* bottom-bar 줄바꿈 */
  .bb-col2{flex-wrap:wrap;gap:4px!important;}
  /* 사이드바 자동 숨김 */
  .sidebar{transform:translateX(-100%);transition:transform .3s ease;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0!important;}
  /* 팝업박스 너비 조정 */
  .popup-box,.pc-box{max-width:90vw!important;box-sizing:border-box;}
}
@media screen and (max-width:768px){
  .cust-zs-cols{margin-left:2%!important;margin-right:2%!important;}
  .cust-zs-col{flex:1 1 90%!important;max-width:100%!important;min-width:0!important;}
  .badge-name{font-size:16px!important;}
  .zs-td{font-size:11px!important;padding:2px 3px!important;}
  .es-img-tbl th,.es-img-tbl td{font-size:11px!important;padding:4px 5px!important;}
  .brand-tabs{gap:4px!important;}
  .bottom-bar{padding:6px 12px!important;}
}

/* ── 전역 터치 최적화 ── */
button, a, input, select, textarea,
.toggle-btn, .icon-item, .card, .side-btn, .sb-btn,
.tab-btn, .brand-tab, .cat-card, .icon-card {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* 착용주기 → 배지 클래스 */
function pbClass(p) {
  if(p.includes("투명"))  return "pb-1day";
  if(p.includes("장기"))  return "pb-long";
  if(p.includes("컬러"))  return "pb-color";
  if(p.includes("난시"))  return "pb-astig";
  if(p.includes("멀티"))  return "pb-multi";
  return "pb-1day";
}

function fmt(n)  { return n.toLocaleString() + "원"; }
function disc(msrp, price) { return Math.round((1 - price / msrp) * 100); }

let curBrand  = brands[0].id;
let curPeriod = "전체";

/* 탭 렌더 */
function renderTabs() {
  document.getElementById("brandTabs").innerHTML = brands.map(b => `
    <button class="brand-tab ${b.id===curBrand?"active":""}"
      style="--bc:${b.color}"
      onclick="selectBrand('${b.id}')">
      <span class="bdot" style="--bc:${b.color}"></span>${b.name}
    </button>`
  ).join("");
}

/* 브랜드 선택 */
function selectBrand(id) {
  curBrand  = id;
  curPeriod = "전체";
  renderTabs();
  renderContent();
}

/* 컨텐츠 렌더 */
function renderContent() {
  const b = brands.find(x => x.id === curBrand);

  // 헤더
  document.getElementById("brandHeader").innerHTML = `
    <div class="brand-header" style="background:linear-gradient(135deg,${b.color}ee,${b.color}99);">
      <div>
        <div class="bh-name">${b.name}</div>
        <div class="bh-sub">${b.full} · ${b.products.length}개 제품</div>
      </div>
      <div class="bh-logo">${b.icon}</div>
    </div>`;

  // 기간 필터
  const periods = ["전체", ...new Set(b.products.map(p => p.period))];
  document.getElementById("periodFilter").innerHTML = periods.map(p => `
    <button class="pf-btn ${p===curPeriod?"active":""}"
      onclick="filterPeriod('${p}')">${p}</button>`
  ).join("");

  renderTable(b);
}

/* 기간 필터 */
function filterPeriod(p) {
  curPeriod = p;
  document.querySelectorAll(".pf-btn").forEach(btn =>
    btn.classList.toggle("active", btn.textContent === p)
  );
  renderTable(brands.find(x => x.id === curBrand));
}

/* 테이블 렌더 — 같은 제품명 묶기 */
function renderTable(b) {
  const list = curPeriod === "전체"
    ? b.products
    : b.products.filter(p => p.period === curPeriod);

  if(!list.length) {
    document.getElementById("tbody").innerHTML = `
      <tr><td colspan="5">
        <div class="empty-state">
          <div class="ei">🔍</div>
          <p>해당 착용주기의 제품이 없습니다</p>
        </div>
      </td></tr>`;
    return;
  }

  // 같은 착용주기 + 제품명으로 그룹핑
  const groups = [];
  list.forEach(p => {
    const last = groups[groups.length - 1];
    if(last && last.period === p.period && last.name === p.name) {
      last.items.push(p);
    } else {
      groups.push({ period:p.period, name:p.name, items:[p] });
    }
  });

  document.getElementById("tbody").innerHTML = groups.map((g, gi) => `
    <tr class="${gi===0?"":"group-start"}">
      <td class="left" style="vertical-align:middle;">
        <span class="pb ${pbClass(g.period)}">${g.period}</span>
      </td>
      <td class="left" style="vertical-align:middle;">
        <div class="pname">${g.name}</div>
      </td>
      <td style="text-align:center;vertical-align:middle;">
        ${g.items.map(p => `<div style="padding:4px 0;"><span class="qty-chip">${p.qty}</span></div>`).join("")}
      </td>
      <td style="text-align:center;vertical-align:middle;">
        ${g.items.map(p => `<div style="padding:4px 0;color:var(--muted);font-size:12px;text-decoration:line-through;">${fmt(p.msrp)}</div>`).join("")}
      </td>
      <td style="text-align:center;vertical-align:middle;">
        ${g.items.map(p => `<div style="padding:4px 0;"><span class="price-inoti">${fmt(p.price)}</span><span class="disc">-${disc(p.msrp, p.price)}%</span></div>`).join("")}
      </td>
    </tr>`
  ).join("");
}

  const els = [
    document.querySelector('.main'),
    document.querySelector('.brand-tabs'),
    document.querySelector('.page-header'),

  els.forEach(el => { if (el) el.style.opacity = '0'; });
  showAccessGate(function () {
    els.forEach(el => { if (el) el.style.opacity = '1'; });
    renderTabs();
    renderContent();
  });
})();
