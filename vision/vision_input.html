<!DOCTYPE html>
<html lang="ko" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="ko">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시력데이터 분석하기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --accent: #1a6fef;
  --text: #0f1c2e;
  --muted: #4b6080;
  --border: rgba(0,0,0,0.09);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  padding: 12px;
}

body::before {
  content: "";
  position: fixed;
  top: -30%; right: -20%;
  width: 65vw; height: 65vw;
  background: radial-gradient(circle, rgba(42,127,255,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.container {
  position: relative;
  z-index: 1;
  /* [FIX] 로그인 후 부드러운 페이드인 */
  transition: opacity 0.4s ease;
  max-width: 900px;
  margin: auto;
  background: #fff;
  border-radius: 20px;
  padding: 20px 28px;
  color: var(--text);
  box-shadow:0 4px 16px rgba(0,0,0,0.10);
}

/* 헤더 */
.header {
  position: relative;
  text-align: center;
  margin-bottom: 14px;
}

.header h1 {
  margin: 0 0 10px;
  font-size: 22px;
  font-weight: 900;
  color: #1e3a8a;
}

.close-btn {
  position: absolute;
  right: 0; top: 0;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: #f1f5f9;
  font-size: 18px;
  cursor: pointer;
  color: #64748b;
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  transition: background .2s;
}
.close-btn:hover { background: #e2e8f0; }

/* 고객 행 */
.customer-row {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 14px;
  background: #eef3fb;
  border: 2px solid #c7d9f0;
  border-radius: 12px;
  padding: 10px 16px;
}

.customer-row label {
  display: block;
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  font-weight: 800;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* 눈 행 */
.eye-row {
  display: grid;
  grid-template-columns: 52px repeat(7, 1fr);
  gap: 8px;
  align-items: end;
  background: #f8fafc;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 10px;
}

.eye-badge {
  width: 40px; height: 40px;
  border-radius: 50%;
  color: white;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.eye-row-r { background: #fff5f5; border-color: #fecaca !important; }
.eye-row-l { background: #eff6ff; border-color: #bfdbfe !important; }

.r { background: linear-gradient(135deg, #ef3f6b, #dc2626); }
.l { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }

.field label {
  display: block;
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  font-weight: 800;
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}

input, select {
  width: 100%;
  height: 38px;
  border: 1px solid var(--border);
  border-radius: 8px;
  text-align: center;
  font-size: 14px;
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  color: #111;
  background: white;
  transition: border-color .2s;
  -webkit-appearance: none;
}

input:focus, select:focus {
  outline: none;
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}

input::placeholder { color: #bdc5d1; }
select option { background: white; color: #111; }

/* ADD */
.add-box {
  border: 2px dashed #93c5fd;
  border-radius: 12px;
  padding: 12px 0;
  margin: 10px 0;
  text-align: center;
  background: #f0f7ff;
}

.add-box label {
  display: block;
  font-weight: 900;
  color: #1e3a8a;
  margin-bottom: 8px;
  font-size: 13px;
  letter-spacing: 1px;
}

.add-box input {
  max-width: 150px;
  border: 2px solid #3b82f6;
  color: #334155;
  font-weight: 700;
}

/* 카드 */
.card {
  border: 1.5px solid #c7d9f0;
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 10px;
  background: #f7faff;
}

.card-title {
  font-weight: 900;
  margin-bottom: 10px;
  font-size: 14px;
  color: #1e3a8a;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title::before {
  content: "";
  display: inline-block;
  width: 4px; height: 16px;
  background: #3b82f6;
  border-radius: 2px;
  flex-shrink: 0;
}

/* 특이사항 라디오 */
.radio-group {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.radio-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all .2s;
  background: white;
  color: #475569;
}

.radio-item:has(input:checked) {
  background: #eff6ff;
  border-color: #3b82f6;
  color: #1d4ed8;
  font-weight: 700;
}

.radio-item input {
  width: auto;
  height: auto;
  border: none;
  box-shadow: none;
  accent-color: #3b82f6;
}

/* 불편사항 */
.symptom-item select { font-size: 14px; font-weight: 700; }

.symptom-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.symptom-item label {
  display: block;
  font-size: 15px;
  font-weight: 900;
  margin-bottom: 5px;
  color: #1e3a8a;
}

/* 버튼 */
.button-group {
  display: grid;
  grid-template-columns: 1fr 1.6fr;
  gap: 10px;
  margin-top: 14px;
}

button {
  height: 48px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  transition: all .2s;
}

.btn-back {
  background: #f1f5f9;
  color: #1e3a8a;
}
.btn-back:hover { background: #e2e8f0; }

.btn-analysis {
  background: linear-gradient(135deg, #1d4ed8, #2a7fff);
  color: white;
  box-shadow: 0 4px 16px rgba(26,111,239,0.20);
}
.btn-analysis:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(42,127,255,0.4);
}



  .cust-zs-col{flex:1 1 90%!important;max-width:100%!important;min-width:0!important;}
  .badge-name{font-size:16px!important;}
  .zs-td{font-size:11px!important;padding:2px 3px!important;}
  .es-img-tbl th,.es-img-tbl td{font-size:11px!important;padding:4px 5px!important;}
  .brand-tabs{gap:4px!important;}
  .bottom-bar{padding:6px 12px!important;}
}

/* ── 전역 터치 최적화 ── */
button, a, input, select, textarea,
.toggle-btn, .icon-item, .card, .side-btn, .sb-btn,
.tab-btn, .brand-tab, .cat-card, .icon-card {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ── 태블릿 반응형 (시력 입력) ── */
@media screen and (max-width: 1024px) {
  .container { max-width: 100%; padding: 16px 20px; }
  .eye-row   { grid-template-columns: 48px repeat(3, 1fr); gap: 6px; }
  .field label { font-size: 10px; }
  input, select { height: 36px; font-size: 13px; }
  .symptom-grid { grid-template-columns: repeat(2, 1fr); }
}
@media screen and (max-width: 768px) {
  body { padding: 8px; }
  .container { padding: 16px 12px; }
  .eye-row { grid-template-columns: 40px 1fr 1fr; gap: 5px; }
  .symptom-grid { grid-template-columns: 1fr 1fr; }
  .button-group { grid-template-columns: 1fr; }
  .customer-row { grid-template-columns: 1fr; }
}

</style>

<script src="../auth.js"></script>
</head>
<body>

<script>
/* [FIX] 인증 게이트 — body 최하단 실행, DOM 준비 완료 상태 */
(function () {
  const c = document.querySelector(".container");
  if (c) c.style.opacity = "0";
  showAccessGate(function () {
    if (c) c.style.opacity = "1";
  });
})();

/* ── 1. 도수 입력 자동 포맷 (SPH / CYL)
   - 숫자만 입력 → 자동으로 앞에 - 붙임
   - 3자리: 첫 번째 수 뒤에 .  예) 150 → -1.50
   - 4자리: 두 번째 수 뒤에 .  예) 1250 → -12.50  (고도수 대비)
   - 단, +로 시작하면 원시로 인식해 + 유지
   - . 직접 입력 허용
── */
function formatDiopter(el) {
  el.addEventListener("input", function() {
    let raw = this.value;

    // + 또는 - 부호 추출
    let sign = "-"; // 기본 음수
    if (raw.startsWith("+")) { sign = "+"; raw = raw.slice(1); }
    else if (raw.startsWith("-")) { sign = "-"; raw = raw.slice(1); }

    // 숫자와 . 만 허용
    raw = raw.replace(/[^0-9.]/g, "");

    // . 이미 있으면 포맷 건드리지 않음 (직접 입력 중)
    if (raw.includes(".")) {
      this.value = sign + raw;
      return;
    }

    // 순수 숫자만
    const digits = raw.replace(/\./g, "");
    if (digits.length === 0) { this.value = ""; return; }
    if (digits.length === 1) { this.value = sign + digits; return; }
    if (digits.length === 2) { this.value = sign + digits; return; }
    if (digits.length === 3) {
      // 3자리: 첫 번째 뒤에 . → X.XX
      this.value = sign + digits[0] + "." + digits.slice(1);
      return;
    }
    if (digits.length >= 4) {
      // 4자리: 두 번째 뒤에 . → XX.XX
      this.value = sign + digits.slice(0, 2) + "." + digits.slice(2, 4);
      return;
    }
  });

  // 포커스 아웃 시 빈 값이면 초기화
  el.addEventListener("blur", function() {
    if (this.value === "-" || this.value === "+") this.value = "";
  });
}

/* ── 2. ADD 입력 자동 포맷
   - 자동으로 + 붙임
   - 3자리: 첫 번째 수 뒤에 .  예) 100 → +1.00
── */
function formatAdd(el) {
  el.addEventListener("input", function() {
    let raw = this.value;

    // 부호 제거 후 숫자/. 만 추출
    raw = raw.replace(/[^0-9.]/g, "");

    if (raw.includes(".")) {
      this.value = raw ? "+" + raw : "";
      return;
    }

    const digits = raw.replace(/\./g, "");
    if (digits.length === 0) { this.value = ""; return; }
    if (digits.length === 1) { this.value = "+" + digits; return; }
    if (digits.length === 2) { this.value = "+" + digits; return; }
    if (digits.length >= 3) {
      this.value = "+" + digits[0] + "." + digits.slice(1, 3);
      return;
    }
  });

  el.addEventListener("blur", function() {
    if (this.value === "+") this.value = "";
  });
}

// 도수 포맷 적용 (SPH, CYL — AXIS, PRISM 제외)
["r_sph","r_cyl","l_sph","l_cyl"].forEach(id => {
  formatDiopter(document.getElementById(id));
});

// ADD 포맷 적용
formatAdd(document.getElementById("add"));

/* ── 3. 필수 항목 표시 CSS 동적 추가 ── */
const requiredStyle = document.createElement("style");
requiredStyle.textContent = `
  .required-mark { color: #ef4444; margin-left: 2px; }
  .input-error {
    border-color: #ef4444 !important;
    box-shadow: 0 0 0 3px rgba(239,68,68,0.12) !important;
  }
  .error-msg {
    font-size: 11px; color: #ef4444; font-weight: 700;
    margin-top: 6px; text-align: center;
    padding: 8px 14px; background: #fef2f2;
    border-radius: 8px; border: 1px solid #fecaca;
  }
`;
document.head.appendChild(requiredStyle);

// 필수 항목 라벨에 * 추가
document.querySelector("#customerName").closest("div").querySelector("label").innerHTML += '<span class="required-mark">*</span>';
document.querySelector("#age").closest("div").querySelector("label").innerHTML += '<span class="required-mark">*</span>';
document.querySelectorAll(".symptom-item label").forEach(lbl => {
  lbl.innerHTML += '<span class="required-mark">*</span>';
});

/* ── 유틸 ── */
function getSpecialValue() {
  const checked = document.querySelector('input[name="special"]:checked');
  return checked ? checked.value : "해당없음";
}

function showError(msg) {
  let el = document.getElementById("validationError");
  if (!el) {
    el = document.createElement("div");
    el.id = "validationError";
    el.className = "error-msg";
    document.querySelector(".button-group").before(el);
  }
  el.textContent = msg;
  el.style.display = "block";
}

function clearError() {
  const el = document.getElementById("validationError");
  if (el) el.style.display = "none";
  document.querySelectorAll(".input-error").forEach(e => e.classList.remove("input-error"));
}

function collectVisionData() {
  const data = {
    customerName: document.getElementById("customerName").value,
    age: document.getElementById("age").value,
    r: {
      sph: document.getElementById("r_sph").value,
      cyl: document.getElementById("r_cyl").value,
      axis: document.getElementById("r_axis").value,
      prism: document.getElementById("r_prism").value,
      base: document.getElementById("r_base").value,
      raw: document.getElementById("r_raw").value,
      corrected: document.getElementById("r_corrected").value
    },
    l: {
      sph: document.getElementById("l_sph").value,
      cyl: document.getElementById("l_cyl").value,
      axis: document.getElementById("l_axis").value,
      prism: document.getElementById("l_prism").value,
      base: document.getElementById("l_base").value,
      raw: document.getElementById("l_raw").value,
      corrected: document.getElementById("l_corrected").value
    },
    add: document.getElementById("add").value,
    special: getSpecialValue(),
    symptoms: {
      nearDiscomfort: document.getElementById("nearDiscomfort").value,
      nightGlare: document.getElementById("nightGlare").value,
      eyeFatigue: document.getElementById("eyeFatigue").value,
      dryness: document.getElementById("dryness").value
    }
  };
  localStorage.setItem("visionAnalysisData", JSON.stringify(data));
}

function goHome()     { location.href = "../index.html"; }
function goAnalysis() {
  clearError();

  // 필수 항목 검증
  const name = document.getElementById("customerName").value.trim();
  const age  = document.getElementById("age").value.trim();
  const nd   = document.getElementById("nearDiscomfort").value;
  const ng   = document.getElementById("nightGlare").value;
  const ef   = document.getElementById("eyeFatigue").value;
  const dry  = document.getElementById("dryness").value;

  let errors = [];
  if (!name) {
    document.getElementById("customerName").classList.add("input-error");
    errors.push("고객명");
  }
  if (!age) {
    document.getElementById("age").classList.add("input-error");
    errors.push("나이");
  }
  if (!nd)  { document.getElementById("nearDiscomfort").classList.add("input-error"); errors.push("근거리 불편"); }
  if (!ng)  { document.getElementById("nightGlare").classList.add("input-error");    errors.push("야간 빛번짐"); }
  if (!ef)  { document.getElementById("eyeFatigue").classList.add("input-error");    errors.push("눈 피로"); }
  if (!dry) { document.getElementById("dryness").classList.add("input-error");       errors.push("건조감"); }

  if (errors.length > 0) {
    showError("필수 입력 항목을 확인해주세요: " + errors.join(", "));
    return;
  }

  collectVisionData();
  location.href = "analyze.html";
}
</script>

</body>
</html>
